name: PR Release Candidate

# Triggered on all PR events. A first job fetches labels via API (reliable on
# all event types) and exposes them as outputs. Downstream jobs gate on those.

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ci-pr-rc-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ---------------------------------------------------------------------------
  # Fetch current PR labels via API so all downstream jobs have a reliable
  # label set regardless of event type (labeled vs synchronize vs reopened).
  # ---------------------------------------------------------------------------

  check-labels:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_app_bump: ${{ steps.labels.outputs.has_app_bump }}
      app_bump_level: ${{ steps.labels.outputs.app_bump_level }}
      has_chart_bump: ${{ steps.labels.outputs.has_chart_bump }}
      chart_bump_level: ${{ steps.labels.outputs.chart_bump_level }}
      is_rc: ${{ steps.labels.outputs.is_rc }}
    steps:
      - name: Fetch labels
        id: labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels --jq '.[].name')
          echo "Labels on PR: $LABELS"

          echo "has_app_bump=false" >> "$GITHUB_OUTPUT"
          echo "app_bump_level=patch" >> "$GITHUB_OUTPUT"
          echo "has_chart_bump=false" >> "$GITHUB_OUTPUT"
          echo "chart_bump_level=patch" >> "$GITHUB_OUTPUT"
          echo "is_rc=false" >> "$GITHUB_OUTPUT"

          if echo "$LABELS" | grep -qE '^bump:app:(patch|minor|major)$'; then
            echo "has_app_bump=true" >> "$GITHUB_OUTPUT"
            if echo "$LABELS" | grep -q '^bump:app:major$'; then
              echo "app_bump_level=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q '^bump:app:minor$'; then
              echo "app_bump_level=minor" >> "$GITHUB_OUTPUT"
            fi
          fi

          if echo "$LABELS" | grep -qE '^bump:chart:(patch|minor|major)$'; then
            echo "has_chart_bump=true" >> "$GITHUB_OUTPUT"
            if echo "$LABELS" | grep -q '^bump:chart:major$'; then
              echo "chart_bump_level=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q '^bump:chart:minor$'; then
              echo "chart_bump_level=minor" >> "$GITHUB_OUTPUT"
            fi
          fi

          if echo "$LABELS" | grep -q '^release-candidate$'; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
          fi

          echo "--- outputs ---"
          cat "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Apply version bumps (same-repo PRs only, when bump labels are present)
  # ---------------------------------------------------------------------------

  debug-outputs:
    needs: [check-labels]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print check-labels outputs
        run: |
          echo "has_app_bump='${{ needs['check-labels'].outputs.has_app_bump }}'"
          echo "has_chart_bump='${{ needs['check-labels'].outputs.has_chart_bump }}'"
          echo "is_rc='${{ needs['check-labels'].outputs.is_rc }}'"
          echo "check-labels result='${{ needs['check-labels'].result }}'"

  apply-bumps:
    needs: [check-labels]
    if: "github.event.pull_request.head.repo.full_name == github.repository && (needs['check-labels'].outputs.has_app_bump == 'true' || needs['check-labels'].outputs.has_chart_bump == 'true')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Apply version bumps
        run: |
          CHART=charts/porpulsion/Chart.yaml
          VALUES=charts/porpulsion/values.yaml
          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"

          bump_semver() {
            local ver=$1 level=$2
            IFS='.' read -r maj min patch <<< "$ver"
            case "$level" in
              major) echo "$((maj+1)).0.0" ;;
              minor) echo "${maj}.$((min+1)).0" ;;
              patch) echo "${maj}.${min}.$((patch+1))" ;;
            esac
          }

          # App bump: only if current branch version matches base (not yet bumped)
          if [ "${{ needs.check-labels.outputs.has_app_bump }}" = "true" ]; then
            base_app=$(git show "$BASE_REF:$CHART" | grep '^appVersion:' | sed 's/appVersion: *"\(.*\)"/\1/')
            curr_app=$(grep '^appVersion:' "$CHART" | sed 's/appVersion: *"\(.*\)"/\1/')
            if [ "$curr_app" = "$base_app" ]; then
              new_app=$(bump_semver "$curr_app" "${{ needs.check-labels.outputs.app_bump_level }}")
              IMAGE_REPO=$(grep 'image:' "$VALUES" | head -1 | awk '{print $2}' | sed 's/:[^:]*$//')
              sed -i "s/^appVersion: .*/appVersion: \"$new_app\"/" "$CHART"
              sed -i "s|^  image: .*|  image: $IMAGE_REPO:$new_app|" "$VALUES"
              echo "Bumped appVersion: $curr_app -> $new_app"
            else
              echo "appVersion already bumped ($base_app -> $curr_app) - skipping"
            fi
          fi

          # Chart bump: only if current branch version matches base (not yet bumped)
          if [ "${{ needs.check-labels.outputs.has_chart_bump }}" = "true" ]; then
            base_chart=$(git show "$BASE_REF:$CHART" | grep '^version:' | awk '{print $2}')
            curr_chart=$(grep '^version:' "$CHART" | awk '{print $2}')
            if [ "$curr_chart" = "$base_chart" ]; then
              new_chart=$(bump_semver "$curr_chart" "${{ needs.check-labels.outputs.chart_bump_level }}")
              sed -i "s/^version: .*/version: $new_chart/" "$CHART"
              echo "Bumped chart version: $curr_chart -> $new_chart"
            else
              echo "chart version already bumped ($base_chart -> $curr_chart) - skipping"
            fi
          fi

      - name: Commit and push
        run: |
          git add charts/porpulsion/Chart.yaml charts/porpulsion/values.yaml
          if git diff --cached --exit-code; then
            echo "No changes to commit."
          else
            git commit -m "chore: bump versions [skip ci]"
            git push origin "${{ github.head_ref }}"
          fi

  # ---------------------------------------------------------------------------
  # RC image build (release-candidate label only)
  # ---------------------------------------------------------------------------

  build-and-publish:
    needs: [check-labels, apply-bumps]
    if: "always() && needs['check-labels'].result == 'success' && needs['apply-bumps'].result != 'failure' && needs['check-labels'].outputs.is_rc == 'true'"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch latest branch head
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: git fetch origin "${{ github.head_ref }}" && git checkout "origin/${{ github.head_ref }}" -- charts/porpulsion/Chart.yaml charts/porpulsion/values.yaml

      - name: Read app version
        id: chart_fresh
        run: |
          app_version=$(grep '^appVersion:' charts/porpulsion/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Assert version bumped
        run: |
          BASE_APP=$(git show "origin/${{ github.event.pull_request.base.ref }}:charts/porpulsion/Chart.yaml" | grep '^appVersion:' | sed 's/appVersion: *"\(.*\)"/\1/')
          PR_APP="${{ steps.chart_fresh.outputs.app_version }}"
          echo "base appVersion: $BASE_APP"
          echo "PR appVersion:   $PR_APP"
          if [ "$BASE_APP" = "$PR_APP" ]; then
            echo "ERROR: appVersion has not been bumped. Add a bump:app:* label before adding release-candidate."
            exit 1
          fi
          echo "Version bumped - OK"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.chart_fresh.outputs.app_version }}-rc

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # E2E tests (release-candidate label only, after image is built)
  # ---------------------------------------------------------------------------

  e2e-tests:
    needs: [check-labels, build-and-publish]
    if: "always() && needs['build-and-publish'].result == 'success' && needs['check-labels'].outputs.is_rc == 'true'"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch latest branch head
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: git fetch origin "${{ github.head_ref }}" && git checkout "origin/${{ github.head_ref }}"

      - name: Install make
        run: sudo apt-get update -qq && sudo apt-get install -y make

      - name: Run E2E suite
        run: make test COMPOSE="docker compose"
        env:
          TEST_USERNAME: admin
          TEST_PASSWORD: adminpass1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down clusters on failure
        if: failure()
        run: make teardown || true

  # ---------------------------------------------------------------------------
  # RC Helm chart publish (release-candidate label only)
  # ---------------------------------------------------------------------------

  publish-helm-chart-rc:
    needs: [check-labels, build-and-publish, apply-bumps]
    if: "always() && needs['check-labels'].result == 'success' && needs['apply-bumps'].result != 'failure' && needs['check-labels'].outputs.is_rc == 'true'"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch latest branch head
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: git fetch origin "${{ github.head_ref }}" && git checkout "origin/${{ github.head_ref }}" -- charts/porpulsion/Chart.yaml charts/porpulsion/values.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Read versions
        id: versions
        run: |
          chart_version=$(grep '^version:' charts/porpulsion/Chart.yaml | awk '{print $2}')
          echo "rc_chart_version=${chart_version}-rc" >> "$GITHUB_OUTPUT"

          base_app=$(git show "origin/${{ github.event.pull_request.base.ref }}:charts/porpulsion/Chart.yaml" | grep '^appVersion:' | sed 's/appVersion: *"\(.*\)"/\1/')
          pr_app=$(grep '^appVersion:' charts/porpulsion/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          echo "rc_app_version=${pr_app}-rc" >> "$GITHUB_OUTPUT"
          if [ "$base_app" != "$pr_app" ]; then
            echo "app_bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package RC chart
        run: |
          sed -i "s/^version: .*/version: ${{ steps.versions.outputs.rc_chart_version }}/" charts/porpulsion/Chart.yaml
          if [ "${{ steps.versions.outputs.app_bumped }}" = "true" ]; then
            IMAGE_REPO=$(grep 'image:' charts/porpulsion/values.yaml | head -1 | awk '{print $2}' | sed 's/:[^:]*$//')
            sed -i "s|^  image: .*|  image: $IMAGE_REPO:${{ steps.versions.outputs.rc_app_version }}|" charts/porpulsion/values.yaml
          fi
          helm package charts/porpulsion --destination .cr-rc-packages

      - name: Push RC chart to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" --password-stdin
          for pkg in .cr-rc-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository_owner }}/charts
          done
