name: PR Release Candidate

# Triggered by bump:app/chart labels and the release-candidate label on PRs.
# Jobs: apply-app-bump, apply-chart-bump, build-and-publish (RC), e2e-tests, publish-helm-chart-rc

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ci-pr-rc-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ---------------------------------------------------------------------------
  # Version bump jobs (same-repo PRs only, triggered by bump:* labels)
  # ---------------------------------------------------------------------------

  apply-app-bump:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        contains(github.event.pull_request.labels.*.name, 'bump:app:patch') ||
        contains(github.event.pull_request.labels.*.name, 'bump:app:minor') ||
        contains(github.event.pull_request.labels.*.name, 'bump:app:major') ||
        github.event.label.name == 'bump:app:patch' ||
        github.event.label.name == 'bump:app:minor' ||
        github.event.label.name == 'bump:app:major'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve bump level
        id: level
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          LABEL='${{ github.event.label.name }}'

          if echo "$LABELS" | grep -q '"bump:app:major"' || [ "$LABEL" = "bump:app:major" ]; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"bump:app:minor"' || [ "$LABEL" = "bump:app:minor" ]; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Write app version
        id: versions
        run: |
          CHART=charts/porpulsion/Chart.yaml
          VALUES=charts/porpulsion/values.yaml
          LEVEL="${{ steps.level.outputs.level }}"

          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          curr_app=$(git show "$BASE_REF:$CHART" | grep '^appVersion:' | sed 's/appVersion: *"\(.*\)"/\1/')

          bump_semver() {
            local ver=$1 level=$2
            IFS='.' read -r maj min patch <<< "$ver"
            case "$level" in
              major) echo "$((maj+1)).0.0" ;;
              minor) echo "${maj}.$((min+1)).0" ;;
              patch) echo "${maj}.${min}.$((patch+1))" ;;
            esac
          }

          new_app=$(bump_semver "$curr_app" "$LEVEL")
          IMAGE_REPO=$(grep 'image:' "$VALUES" | head -1 | awk '{print $2}' | sed 's/:[^:]*$//')

          sed -i "s/^appVersion: .*/appVersion: \"$new_app\"/" "$CHART"
          sed -i "s|^  image: .*|  image: $IMAGE_REPO:$new_app|" "$VALUES"

          echo "new_app=$new_app" >> "$GITHUB_OUTPUT"
          echo "Bumped appVersion: $curr_app -> $new_app"

      - name: Commit and push
        run: |
          git add charts/porpulsion/Chart.yaml charts/porpulsion/values.yaml
          if git diff --cached --exit-code; then
            echo "No changes to commit."
          else
            LAST_MSG=$(git log -1 --format="%s")
            if echo "$LAST_MSG" | grep -q "chore: bump app="; then
              git commit --amend --no-edit
              git push --force-with-lease origin "${{ github.head_ref }}"
            else
              git commit -m "chore: bump app=${{ steps.versions.outputs.new_app }}"
              git push origin "${{ github.head_ref }}"
            fi
          fi

  apply-chart-bump:
    needs: [apply-app-bump]
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        contains(github.event.pull_request.labels.*.name, 'bump:chart:patch') ||
        contains(github.event.pull_request.labels.*.name, 'bump:chart:minor') ||
        contains(github.event.pull_request.labels.*.name, 'bump:chart:major') ||
        github.event.label.name == 'bump:chart:patch' ||
        github.event.label.name == 'bump:chart:minor' ||
        github.event.label.name == 'bump:chart:major'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve bump level
        id: level
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          LABEL='${{ github.event.label.name }}'

          if echo "$LABELS" | grep -q '"bump:chart:major"' || [ "$LABEL" = "bump:chart:major" ]; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"bump:chart:minor"' || [ "$LABEL" = "bump:chart:minor" ]; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Write chart version
        id: versions
        run: |
          CHART=charts/porpulsion/Chart.yaml
          LEVEL="${{ steps.level.outputs.level }}"

          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          curr_chart=$(git show "$BASE_REF:$CHART" | grep '^version:' | awk '{print $2}')

          bump_semver() {
            local ver=$1 level=$2
            IFS='.' read -r maj min patch <<< "$ver"
            case "$level" in
              major) echo "$((maj+1)).0.0" ;;
              minor) echo "${maj}.$((min+1)).0" ;;
              patch) echo "${maj}.${min}.$((patch+1))" ;;
            esac
          }

          new_chart=$(bump_semver "$curr_chart" "$LEVEL")
          sed -i "s/^version: .*/version: $new_chart/" "$CHART"

          echo "new_chart=$new_chart" >> "$GITHUB_OUTPUT"
          echo "Bumped chart version: $curr_chart -> $new_chart"

      - name: Commit and push
        run: |
          git add charts/porpulsion/Chart.yaml
          if git diff --cached --exit-code; then
            echo "No changes to commit."
          else
            LAST_MSG=$(git log -1 --format="%s")
            if echo "$LAST_MSG" | grep -q "chore: bump chart="; then
              git commit --amend --no-edit
              git push --force-with-lease origin "${{ github.head_ref }}"
            else
              git commit -m "chore: bump chart=${{ steps.versions.outputs.new_chart }}"
              git push origin "${{ github.head_ref }}"
            fi
          fi

  # ---------------------------------------------------------------------------
  # RC image build (release-candidate label only)
  # ---------------------------------------------------------------------------

  build-and-publish:
    needs: [apply-app-bump, apply-chart-bump]
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      (
        contains(github.event.pull_request.labels.*.name, 'release-candidate') ||
        github.event.label.name == 'release-candidate'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest branch head
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: git fetch origin "${{ github.head_ref }}" && git checkout "origin/${{ github.head_ref }}" -- charts/porpulsion/Chart.yaml charts/porpulsion/values.yaml

      - name: Read app version
        id: chart_fresh
        run: |
          app_version=$(grep '^appVersion:' charts/porpulsion/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Assert version bumped
        run: |
          BASE_APP=$(git show "origin/${{ github.event.pull_request.base.ref }}:charts/porpulsion/Chart.yaml" | grep '^appVersion:' | sed 's/appVersion: *"\(.*\)"/\1/')
          PR_APP="${{ steps.chart_fresh.outputs.app_version }}"
          echo "base appVersion: $BASE_APP"
          echo "PR appVersion:   $PR_APP"
          if [ "$BASE_APP" = "$PR_APP" ]; then
            echo "ERROR: appVersion has not been bumped. Add a bump:app:* label before adding release-candidate."
            exit 1
          fi
          echo "Version bumped - OK"

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.chart_fresh.outputs.app_version }}-rc

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # E2E tests (release-candidate label only, after image is built)
  # ---------------------------------------------------------------------------

  e2e-tests:
    needs: [build-and-publish]
    if: >
      always() &&
      needs.build-and-publish.result == 'success' &&
      github.event_name == 'pull_request' &&
      (
        contains(github.event.pull_request.labels.*.name, 'release-candidate') ||
        github.event.label.name == 'release-candidate'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch latest branch head
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: git fetch origin "${{ github.head_ref }}" && git checkout "origin/${{ github.head_ref }}"

      - name: Install make
        run: sudo apt-get update -qq && sudo apt-get install -y make

      - name: Run E2E suite
        run: make test COMPOSE="docker compose"
        env:
          TEST_USERNAME: admin
          TEST_PASSWORD: adminpass1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down clusters on failure
        if: failure()
        run: make teardown || true

  # ---------------------------------------------------------------------------
  # RC Helm chart publish (release-candidate label only)
  # ---------------------------------------------------------------------------

  publish-helm-chart-rc:
    needs: [build-and-publish, apply-app-bump, apply-chart-bump]
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      (
        contains(github.event.pull_request.labels.*.name, 'release-candidate') ||
        github.event.label.name == 'release-candidate'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch latest branch head
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: git fetch origin "${{ github.head_ref }}" && git checkout "origin/${{ github.head_ref }}" -- charts/porpulsion/Chart.yaml charts/porpulsion/values.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Read versions
        id: versions
        run: |
          chart_version=$(grep '^version:' charts/porpulsion/Chart.yaml | awk '{print $2}')
          echo "rc_chart_version=${chart_version}-rc" >> "$GITHUB_OUTPUT"

          base_app=$(git show "origin/${{ github.event.pull_request.base.ref }}:charts/porpulsion/Chart.yaml" | grep '^appVersion:' | sed 's/appVersion: *"\(.*\)"/\1/')
          pr_app=$(grep '^appVersion:' charts/porpulsion/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          echo "rc_app_version=${pr_app}-rc" >> "$GITHUB_OUTPUT"
          if [ "$base_app" != "$pr_app" ]; then
            echo "app_bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package RC chart
        run: |
          sed -i "s/^version: .*/version: ${{ steps.versions.outputs.rc_chart_version }}/" charts/porpulsion/Chart.yaml
          if [ "${{ steps.versions.outputs.app_bumped }}" = "true" ]; then
            IMAGE_REPO=$(grep 'image:' charts/porpulsion/values.yaml | head -1 | awk '{print $2}' | sed 's/:[^:]*$//')
            sed -i "s|^  image: .*|  image: $IMAGE_REPO:${{ steps.versions.outputs.rc_app_version }}|" charts/porpulsion/values.yaml
          fi
          helm package charts/porpulsion --destination .cr-rc-packages

      - name: Push RC chart to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" --password-stdin
          for pkg in .cr-rc-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository_owner }}/charts
          done
