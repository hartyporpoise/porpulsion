name: Main Release

# Runs on push to main only.
# Jobs: detect-changes, build-and-publish, create-release, publish-helm-chart

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # Detect whether appVersion or chart version changed vs the previous commit.
  detect-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      app_version_changed: ${{ steps.detect.outputs.app_version_changed }}
      app_version: ${{ steps.detect.outputs.app_version }}
      chart_version_changed: ${{ steps.detect.outputs.chart_version_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version changes
        id: detect
        run: |
          prev_app=$(git show HEAD~1:charts/porpulsion/Chart.yaml 2>/dev/null | grep '^appVersion:' | sed 's/appVersion: *"\(.*\)"/\1/' || echo "none")
          curr_app=$(grep '^appVersion:' charts/porpulsion/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          prev_chart=$(git show HEAD~1:charts/porpulsion/Chart.yaml 2>/dev/null | grep '^version:' | awk '{print $2}' || echo "none")
          curr_chart=$(grep '^version:' charts/porpulsion/Chart.yaml | awk '{print $2}')

          echo "appVersion:   $prev_app -> $curr_app"
          echo "chartVersion: $prev_chart -> $curr_chart"
          echo "app_version=$curr_app" >> "$GITHUB_OUTPUT"

          [ "$prev_app" != "$curr_app" ] \
            && echo "app_version_changed=true" >> "$GITHUB_OUTPUT" \
            || echo "app_version_changed=false" >> "$GITHUB_OUTPUT"

          [ "$prev_chart" != "$curr_chart" ] \
            && echo "chart_version_changed=true" >> "$GITHUB_OUTPUT" \
            || echo "chart_version_changed=false" >> "$GITHUB_OUTPUT"

  # Build and push Docker image when appVersion changed.
  build-and-publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.detect-changes.outputs.app_version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Tag the repo and create a GitHub release when appVersion changed.
  create-release:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.detect-changes.outputs.app_version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --latest

  # Package and publish the Helm chart when chart version changed.
  publish-helm-chart:
    needs: detect-changes
    if: needs.detect-changes.outputs.chart_version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package helm chart
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          config: .github/config/cr.yaml
          skip_existing: true
          skip_upload: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish chart to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" --password-stdin
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository_owner }}/charts
          done
