name: Release Helm Chart

# Runs on merge to main when charts/ changed.
# - Packages and pushes the Helm chart to GHCR (chart-releaser creates its own tag)
# - Creates a v{appVersion} git tag to trigger the Docker image build in deploy.yaml

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

env:
  CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      app_version_changed: ${{ steps.check.outputs.app_version_changed }}
      app_version: ${{ steps.check.outputs.app_version }}
      chart_version_changed: ${{ steps.check.outputs.chart_version_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check what changed
        id: check
        run: |
          prev_app=$(git show HEAD~1:charts/porpulsion/Chart.yaml 2>/dev/null | grep '^appVersion:' | sed 's/appVersion: *"\(.*\)"/\1/' || echo "none")
          curr_app=$(grep '^appVersion:' charts/porpulsion/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          prev_ver=$(git show HEAD~1:charts/porpulsion/Chart.yaml 2>/dev/null | grep '^version:' | awk '{print $2}' || echo "none")
          curr_ver=$(grep '^version:' charts/porpulsion/Chart.yaml | awk '{print $2}')

          echo "appVersion: $prev_app → $curr_app"
          echo "version:    $prev_ver → $curr_ver"
          echo "app_version=$curr_app" >> "$GITHUB_OUTPUT"

          [ "$prev_app" != "$curr_app" ] \
            && echo "app_version_changed=true" >> "$GITHUB_OUTPUT" \
            || echo "app_version_changed=false" >> "$GITHUB_OUTPUT"

          [ "$prev_ver" != "$curr_ver" ] \
            && echo "chart_version_changed=true" >> "$GITHUB_OUTPUT" \
            || echo "chart_version_changed=false" >> "$GITHUB_OUTPUT"

  release-chart:
    needs: check
    if: needs.check.outputs.chart_version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          config: .github/config/cr.yaml
          skip_existing: true
          skip_upload: true

      - name: Push chart to GHCR
        run: |
          echo "$CR_TOKEN" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" --password-stdin
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository_owner }}/charts
          done

  tag-app:
    needs: check
    if: needs.check.outputs.app_version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push app version tag
        run: |
          VERSION="v${{ needs.check.outputs.app_version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
