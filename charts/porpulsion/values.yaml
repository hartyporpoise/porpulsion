#
# porpulsion  peer-to-peer Kubernetes connector
# Helm chart default values
#

# -- Agent
agent:
  # -- Container image for the porpulsion agent.
  image: ghcr.io/hartyporpoise/porpulsion:1.3.2

  # -- Image pull policy. Use `Always` when pushing to a remote registry.
  pullPolicy: IfNotPresent

  # -- Number of agent replicas. Only 1 is supported; this field is reserved.
  replicas: 1

  # -- Human-readable name for this agent, shown in the dashboard and used
  #    during peer handshakes. Defaults to the hostname if unset.
  agentName: ""

  # -- CPU/memory requests and limits for the agent container.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -- Externally reachable URL for the WebSocket peer channel and peering handshake.
  #    Peer agents connect here to open the persistent /agent/ws channel.
  #    Must be set; there is no auto-detection fallback.
  #    In most deployments this is the same as apiDomain.
  #    Use a different value only for split-ingress setups where the WebSocket
  #    endpoint is on a separate hostname (e.g. internal API, external WS).
  #    Example: "https://porpulsion.example.com"
  websocketDomain: ""

  # -- Externally reachable URL for the HTTP API, dashboard, and image registry proxy.
  #    Used as the base URL in pull secrets for the image pull-through proxy.
  #    Must be set; there is no auto-detection fallback.
  #    In most deployments this is the same as websocketDomain.
  #    Use a different value only for split-ingress setups where the API is
  #    on a separate hostname from the WebSocket endpoint.
  #    Example: "https://porpulsion.example.com"
  apiDomain: ""

# -- Service
# All traffic is served on a single port (8000):
#   /          dashboard UI
#   /api/*     management API (session auth required)
#   /ws        peer WebSocket channel (peer/hello auth, no session required)
#   /status    health/readiness probes (no auth)
#
#   kubectl port-forward svc/porpulsion 8000:8000

service:
  # -- Service type. ClusterIP for production; NodePort for local dev.
  type: ClusterIP

  # -- Port for all traffic.
  port: 8000

  # -- NodePort. Only used when type=NodePort.
  nodePort: ""

# -- NetworkPolicy
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, Weave, etc.).
networkPolicy:
  # -- Enable the NetworkPolicy. Set to false if your CNI does not support it.
  enabled: true

  # -- Additional destination CIDRs that executing app pods are allowed to reach.
  #    By default, executing apps can only egress to the public internet (private
  #    RFC-1918 ranges are blocked). Add entries here to allow workloads to reach
  #    private addresses, for example to proxy through a deployed pod to an
  #    internal service or on-prem resource.
  #    Example:
  #      egressCIDRs:
  #        - 10.20.0.0/16
  #        - 172.31.5.42/32
  egressCIDRs: []
