apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "porpulsion.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "porpulsion.fullname" . }}-agent
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      app: {{ include "porpulsion.fullname" . }}-agent
  template:
    metadata:
      labels:
        app: {{ include "porpulsion.fullname" . }}-agent
      annotations:
        # Force a pod restart on every helm upgrade so the new image is always pulled.
        helm.sh/chart-revision: {{ .Release.Revision | quote }}
    spec:
      serviceAccountName: {{ include "porpulsion.fullname" . }}-sa
      containers:
        - name: agent
          image: {{ .Values.agent.image }}
          imagePullPolicy: {{ .Values.agent.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: AGENT_NAME
              value: {{ .Values.agent.agentName | quote }}
            - name: WS_DOMAIN
              value: {{ required "agent.websocketDomain is required (e.g. https://porpulsion.example.com)" .Values.agent.websocketDomain | quote }}
            - name: API_DOMAIN
              value: {{ required "agent.apiDomain is required (e.g. https://porpulsion.example.com)" .Values.agent.apiDomain | quote }}
          readinessProbe:
            httpGet:
              path: /status
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /status
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
