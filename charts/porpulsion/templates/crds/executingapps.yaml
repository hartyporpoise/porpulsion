apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: executingapps.porpulsion.io
  labels:
    app: {{ include "porpulsion.fullname" . }}
spec:
  group: porpulsion.io
  names:
    kind: ExecutingApp
    listKind: ExecutingAppList
    plural: executingapps
    singular: executingapp
    shortNames:
      - ea
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Source
          type: string
          jsonPath: .metadata.labels['porpulsion\.io/source-peer']
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [image]
              description: >
                ExecutingApp spec - defines a containerised workload being executed on this cluster on behalf of a peer.
              properties:
{{ .Files.Get "files/schema.yaml" | indent 16 }}
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: Current lifecycle phase reported by the agent
                appId:
                  type: string
                  description: Internal app ID assigned by the submitting agent
                sourcePeer:
                  type: string
                  description: Name of the peer that submitted this app
                resourceName:
                  type: string
                  description: Sanitized k8s resource name used for Deployment/CM/Secret/PVC
                message:
                  type: string
                  description: Human-readable status message
                updatedAt:
                  type: string
                  description: ISO-8601 timestamp of last spec or status update
