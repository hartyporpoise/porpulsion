apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "porpulsion.fullname" . }}
  namespace: {{ .Release.Namespace }}
rules:
  # -- Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]

  # -- Events - kopf posts operator events to the namespace
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]

  # -- Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # -- Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # -- Secrets  porpulsion system secrets (named access)
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["porpulsion-credentials", "porpulsion-peers", "porpulsion-users"]
    verbs: ["get", "patch"]

  # -- Secrets  registry credential secrets (list + full lifecycle via label selector)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch", "delete"]

  # -- ConfigMaps  porpulsion system configmap (named access)
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["porpulsion-state"]
    verbs: ["get", "patch"]

  # -- ConfigMaps  remoteapp-managed configmaps (create + full lifecycle)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "update", "patch", "delete"]

  # -- RemoteApp CRD
  - apiGroups: ["porpulsion.io"]
    resources: ["remoteapps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["porpulsion.io"]
    resources: ["remoteapps/status"]
    verbs: ["get", "update", "patch"]

  # -- ExecutingApp CRD
  - apiGroups: ["porpulsion.io"]
    resources: ["executingapps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["porpulsion.io"]
    resources: ["executingapps/status"]
    verbs: ["get", "update", "patch"]

  {{- if .Values.agent.allowPvcs }}
  # -- PersistentVolumeClaims  enabled via agent.allowPvcs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  {{- end }}
