# porpulsion-credentials — agent CA cert + key. Never exposed externally.
# helm.sh/resource-policy: keep prevents helm uninstall from wiping the CA.
apiVersion: v1
kind: Secret
metadata:
  name: porpulsion-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "porpulsion.fullname" . }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data: {}
---
# porpulsion-peers — persisted peer list (name, url, ca_pem per peer).
apiVersion: v1
kind: Secret
metadata:
  name: porpulsion-peers
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "porpulsion.fullname" . }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data: {}
---
# porpulsion-users — bcrypt-hashed user accounts.
# Empty on first install; populated via the signup page on first boot.
apiVersion: v1
kind: Secret
metadata:
  name: porpulsion-users
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "porpulsion.fullname" . }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data: {}
---
# porpulsion-state — agent settings + pending approval queue.
apiVersion: v1
kind: ConfigMap
metadata:
  name: porpulsion-state
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "porpulsion.fullname" . }}
  annotations:
    helm.sh/resource-policy: keep
data: {}
