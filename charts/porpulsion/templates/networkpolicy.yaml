{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "porpulsion.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "porpulsion.fullname" . }}-agent
spec:
  podSelector:
    matchLabels:
      app: {{ include "porpulsion.fullname" . }}-agent

  policyTypes:
    - Ingress
    - Egress

  # Ingress
  ingress:
    # Same-namespace pods - no port restriction
    - from:
        - podSelector: {}
    # Any in-cluster source on the agent port
    - from:
        - namespaceSelector: {}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP

  # Egress 
  egress:
    # Same-namespace pods - unrestricted
    - to:
        - podSelector: {}

    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system

    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # RFC1918 class A - home/office/cloud internal networks
              - 10.0.0.0/8
              # RFC1918 class B - common cloud VPC and Docker ranges
              - 172.16.0.0/12
              # RFC1918 class C - most home routers / home-lab networks
              - 192.168.0.0/16
              # Link-local (APIPA, AWS metadata service 169.254.169.254)
              - 169.254.0.0/16
              # IPv4-mapped / loopback-adjacent range
              - 100.64.0.0/10
{{- end }}
